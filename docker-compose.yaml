services:
  profile-db:
    image: postgres:16.1
    environment:
      POSTGRES_PASSWORD: ${PROFILE_DB_PASSWORD}
      POSTGRES_USER: ${PROFILE_DB_USER}
      POSTGRES_DB: ${PROFILE_DB_NAME}
    ports:
      - "5460:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d profile_db"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s
    networks:
      - haxer-net
    volumes:
      - profile-db-data:/var/lib/postgresql/data
    restart: unless-stopped

  profile-service:
    build: profile_service
    environment:
      HOST: ${PROFILE_DB_HOST}
      USER: ${PROFILE_DB_USER}
      PASSWORD: ${PROFILE_DB_PASSWORD}
      SSLMODE: ${PROFILE_DB_SSLMODE}
      PROFILE_DBNAME: ${PROFILE_DB_NAME}
      PROFILE_PORT: ${PROFILE_DB_PORT}
      JWT_SECRET: ${JWT_SECRET}

      GRPC_PORT: "50051"
      PROFILE_GRPC_AUTH_PORT: "50053"
      PROFILE_GRPC_DIRECTORY_PORT: "50054"
      PROFILE_HTTP_PORT: "8083"
    ports:
      - "8080:8083"
      - "50051:50051"
      - "50052:50054"
    depends_on:
      profile-db:
        condition: service_healthy
    networks:
      - haxer-net
    restart: unless-stopped

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    networks:
      - haxer-net
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 10

  mongo:
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
    ports:
      - "27017:27017"
    networks:
      - haxer-net
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped
    command: mongod --quiet
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10

  chat-db:
    image: postgres:16.1
    environment:
      POSTGRES_PASSWORD: ${CHAT_DB_PASSWORD}
      POSTGRES_USER: ${CHAT_DB_USER}
      POSTGRES_DB: ${CHAT_DB_NAME}
    ports:
      - "5461:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d chat_db"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s
    networks:
      - haxer-net
    volumes:
      - chat-db-data:/var/lib/postgresql/data
    restart: unless-stopped

  chat-service:
    build: ./chat_service
    environment:
      HOST: ${CHAT_DB_HOST}
      USER: ${CHAT_DB_USER}
      PASSWORD: ${CHAT_DB_PASSWORD}
      SSLMODE: ${CHAT_DB_SSLMODE}
      ROOM_DBNAME: ${CHAT_DB_NAME}
      ROOM_DBPORT: ${CHAT_DB_PORT}
      JWT_SECRET: ${JWT_SECRET}

      PROFILE_SERVICE_AUTH_ADDR: "profile-service:50051"
      PROFILE_SERVICE_DIRECTORY_ADDR: "profile-service:50054"
      CHAT_HTTP_PORT: "8084"

      REDIS_ADDR: ${REDIS_ADDR}
      REDIS_DB: ${REDIS_DB}
      IDLE_THRESHOLD: ${IDLE_THRESHOLD}

      GRPS_ADRESS: "0.0.0.0:50056"
    ports:
      - "8081:8084"
      - "50055:50056"
    depends_on:
      chat-db:
        condition: service_healthy
      profile-service:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - haxer-net
    restart: unless-stopped

  kafka-1:
    image: apache/kafka:latest
    container_name: kafka-1
    networks:
      - haxer-net
    ports:
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'controller,broker'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_CLUSTER_ID: ${KAFKA_CLUSTER_ID}
      KAFKA_LISTENERS: 'PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka-1:9092,EXTERNAL://localhost:9094'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'

  kafka-2:
    image: apache/kafka:latest
    container_name: kafka-2
    networks:
      - haxer-net
    ports:
      - "9095:9094"
    environment:
      KAFKA_NODE_ID: 2
      KAFKA_PROCESS_ROLES: 'controller,broker'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_CLUSTER_ID: ${KAFKA_CLUSTER_ID}
      KAFKA_LISTENERS: 'PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka-2:9092,EXTERNAL://localhost:9095'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'

  kafka-3:
    image: apache/kafka:latest
    container_name: kafka-3
    networks:
      - haxer-net
    ports:
      - "9096:9094"
    environment:
      KAFKA_NODE_ID: 3
      KAFKA_PROCESS_ROLES: 'controller,broker'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_CLUSTER_ID: ${KAFKA_CLUSTER_ID}
      KAFKA_LISTENERS: 'PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka-3:9092,EXTERNAL://localhost:9096'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8085:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka-1:9092,kafka-2:9092,kafka-3:9092
    networks:
      - haxer-net
    depends_on:
      - kafka-1
      - kafka-2
      - kafka-3

networks:
  haxer-net:
    driver: bridge

volumes:
  profile-db-data:
  chat-db-data:
  redis-data:
  mongo-data: