name: Deploy Profile Service

on:
  push:
    branches: [ main ]
    paths:
      - 'profile_service/**'
      - 'shared-proto/**'
      - 'docker-compose.yml'
      - '.github/workflows/deploy-profile.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push profile-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: profile_service/Dockerfile
          push: true
          tags: your-registry/profile-service:latest

      - name: Restart service on server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /opt/haxer
            docker compose pull profile-service
            docker compose up -d profile-service